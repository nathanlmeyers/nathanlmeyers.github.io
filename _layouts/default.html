<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>{{ site.title | default: site.github.repository_name }}</title>
    <meta name="description" content="{{ site.description | default: site.github.project_tagline }}">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <a href="#content" class="sr-only sr-only-focusable">Skip to content</a>

    <header>
      <h1>{{ site.title | default: site.github.repository_name }}</h1>
      <nav aria-label="Social links">
        <a href="https://github.com/{{ site.author.github_username }}" aria-label="GitHub">GitHub</a>
        <a href="https://www.linkedin.com/in/{{ site.author.linkedin_username }}" aria-label="LinkedIn">LinkedIn</a>
      </nav>
    </header>

    <main id="content">
      {{ content }}

      <section class="spotify-embed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/0ULdcEveylleUJL0iEGBig?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" title="Spotify playlist"></iframe>
      </section>
    </main>
  </body>
</html>
